<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 출석 체크 시스템</title>
    
    <!-- Firebase SDK (Compat Version for simplicity in single file) -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>

    <style>
        /* CSS 스타일링 */
        :root {
            --primary-color: #2196F3;
            --bg-color: #e3f2fd; /* 밝은 파란색 배경 */
            --attendance-color: #4caf50;
            --absence-color: #f44336;
            --late-color: #ff9800;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #1565c0;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-attend { background-color: var(--attendance-color); }
        .btn-absent { background-color: var(--absence-color); }
        .btn-late { background-color: var(--late-color); }

        .record-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid var(--bg-color);
        }

        #attendanceList {
            list-style: none;
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .record-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .record-info .name {
            font-weight: bold;
            display: block;
        }

        .record-info .time {
            font-size: 0.8rem;
            color: #888;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: white;
            font-weight: 500;
        }

        /* 스크롤바 디자인 */
        #attendanceList::-webkit-scrollbar { width: 6px; }
        #attendanceList::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👨‍🎓 학생 출석 시스템</h1>

    <div class="input-group">
        <input type="text" id="studentName" placeholder="학생 이름을 입력하세요" autocomplete="off">
    </div>

    <div class="btn-group">
        <button class="btn-attend" onclick="addRecord('출석')">출석</button>
        <button class="btn-absent" onclick="addRecord('결석')">결석</button>
        <button class="btn-late" onclick="addRecord('지각')">지각</button>
    </div>

    <div class="record-title">최근 출석 기록</div>
    <ul id="attendanceList">
        <!-- 기록이 여기에 실시간으로 표시됩니다 -->
    </ul>
</div>

<script>
    // 1. Firebase 설정 (본인의 정보로 교체하세요)
    const firebaseConfig = {
      apiKey: "AIzaSyDdHB2OEnfgvbz050k5GSJ29XDbnyOEUmA",
  authDomain: "project-1401136248940784594.firebaseapp.com",
  databaseURL: "https://project-1401136248940784594-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "project-1401136248940784594",
  storageBucket: "project-1401136248940784594.firebasestorage.app",
  messagingSenderId: "536750214053",
  appId: "1:536750214053:web:be98ff639857990989f64c",
  measurementId: "G-99HCJVT0WJ"
    };

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const studentInput = document.getElementById('studentName');
    const attendanceList = document.getElementById('attendanceList');

    // 2. 출석 데이터 저장 함수
    function addRecord(status) {
        const name = studentInput.value.trim();

        if (!name) {
            alert("학생 이름을 입력해주세요.");
            return;
        }

        db.collection("attendance").add({
            name: name,
            status: status,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        })
        .then(() => {
            studentInput.value = ""; // 입력창 초기화
        })
        .catch((error) => {
            console.error("Error adding document: ", error);
        });
    }

    // 3. 실시간 데이터 리스너 (Real-time Updates)
    db.collection("attendance").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        attendanceList.innerHTML = ""; // 목록 초기화

        snapshot.forEach((doc) => {
            const data = doc.data();
            const time = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString('ko-KR', {
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            }) : "방금 전";

            const li = document.createElement('li');
            li.className = 'record-item';
            
            let badgeColor;
            if(data.status === '출석') badgeColor = 'var(--attendance-color)';
            else if(data.status === '결석') badgeColor = 'var(--absence-color)';
            else badgeColor = 'var(--late-color)';

            li.innerHTML = `
                <div class="record-info">
                    <span class="name">${data.name}</span>
                    <span class="time">${time}</span>
                </div>
                <span class="status-badge" style="background-color: ${badgeColor}">${data.status}</span>
            `;
            attendanceList.appendChild(li);
        });
    });
</script>

</body>
</html>
